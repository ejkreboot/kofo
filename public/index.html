<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kofo Photography</title>
  <link rel="stylesheet" href="/styles/global.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="password-page">
    <div class="password-card">
      <img src="/logo.png" alt="Kofo Photography" class="logo-landing" />
      <div class="brand">Kofo Photography</div>

      <svg class="password-icon" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>

      <h1>View Your Gallery</h1>
      <p class="subtitle">Enter the album name and password provided by your photographer.</p>

      <form id="auth-form">
        <input type="text" id="album-name" placeholder="Album name" autocomplete="off" required />
        <input type="password" id="album-password" placeholder="Password" required />
        <button type="submit" id="submit-btn">
          <span id="btn-text">Enter Gallery</span>
          <svg id="btn-spinner" class="spinner" style="display:none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
        </button>
        <p id="auth-error" class="error" style="display:none"></p>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('auth-form');
    const errorEl = document.getElementById('auth-error');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      btnText.textContent = 'Verifying…';
      btnSpinner.style.display = 'inline';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            albumName: document.getElementById('album-name').value.trim(),
            password: document.getElementById('album-password').value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Authentication failed');
        }

        sessionStorage.setItem('kofo_token', data.token);
        sessionStorage.setItem('kofo_album', JSON.stringify(data.album));
        window.location.href = '/gallery.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btnText.textContent = 'Enter Gallery';
        btnSpinner.style.display = 'none';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
