<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kofo Photography</title>
  <link rel="stylesheet" href="/styles/global.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="landing-page">
    <!-- Subtle grain overlay -->
    <div class="grain"></div>

    <!-- Top nav bar -->
    <nav class="landing-nav">
      <span class="nav-wordmark">KOFO</span>
      <span class="nav-tagline">Photography &amp; Portraiture</span>
    </nav>

    <!-- Center content -->
    <main class="landing-main">
      <div class="landing-logo-wrap">
        <img src="/logo.png" alt="Kofo Photography" class="logo-landing" />
        <div class="logo-glow"></div>
      </div>

      <h1 class="landing-heading">
        <span class="heading-line">Client</span>
        <span class="heading-line accent">Gallery</span>
      </h1>

      <p class="landing-subtitle">Enter your album credentials to view and download your photos.</p>

      <form id="auth-form" class="landing-form">
        <div class="input-group">
          <input type="text" id="album-name" placeholder="Album name" autocomplete="off" required />
        </div>
        <div class="input-group">
          <input type="password" id="album-password" placeholder="Password" required />
        </div>
        <button type="submit" id="submit-btn">
          <span id="btn-text">Enter Gallery</span>
          <svg id="btn-spinner" class="spinner" style="display:none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
          <svg class="btn-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
        <p id="auth-error" class="error" style="display:none"></p>
      </form>
    </main>

    <!-- Footer -->
    <footer class="landing-footer">
      <div class="footer-line"></div>
      <p>&copy; 2026 Kofo Photography. All rights reserved.</p>
    </footer>
  </div>

  <script>
    const form = document.getElementById('auth-form');
    const errorEl = document.getElementById('auth-error');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      btnText.textContent = 'Verifying…';
      btnSpinner.style.display = 'inline';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            albumName: document.getElementById('album-name').value.trim(),
            password: document.getElementById('album-password').value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Authentication failed');
        }

        sessionStorage.setItem('kofo_token', data.token);
        sessionStorage.setItem('kofo_album', JSON.stringify(data.album));
        window.location.href = '/gallery.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        btnText.textContent = 'Enter Gallery';
        btnSpinner.style.display = 'none';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
