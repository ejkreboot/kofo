<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kofo Admin</title>
  <link rel="stylesheet" href="/styles/global.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="landing-page">
    <div class="grain"></div>

    <nav class="landing-nav">
      <span class="nav-wordmark">KOFO</span>
      <span class="nav-tagline">Admin</span>
    </nav>

    <main class="landing-main">
      <h1 class="landing-heading">
        <span class="heading-line">Create</span>
        <span class="heading-line accent">Album</span>
      </h1>

      <p class="landing-subtitle">Create a new album with its own storage bucket.</p>

      <form id="admin-form" class="landing-form">
        <div class="input-group">
          <input type="password" id="admin-key" placeholder="Admin API key" required />
        </div>
        <div class="input-group">
          <input type="text" id="album-name" placeholder="Album name" autocomplete="off" required />
        </div>
        <div class="input-group">
          <input type="password" id="album-password" placeholder="Album password" required />
        </div>
        <button type="submit" id="submit-btn">
          <span id="btn-text">Create Album</span>
          <svg id="btn-spinner" class="spinner" style="display:none" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
        </button>
        <p id="form-error" class="error" style="display:none"></p>
        <p id="form-success" class="admin-success" style="display:none"></p>
      </form>
    </main>

    <footer class="landing-footer">
      <div class="footer-line"></div>
      <p>&copy; 2026 Kofo Photography. All rights reserved.</p>
    </footer>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
