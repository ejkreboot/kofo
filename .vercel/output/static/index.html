<!DOCTYPE html><html lang="en"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kort Amateur Photography</title><link rel="stylesheet" href="/styles/global.css"></head> <body> <main class="password-page"> <div class="password-card"> <div class="brand">Kort Amateur Photography</div> <div class="password-icon"> <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"> <rect x="2" y="6" width="20" height="14" rx="2"></rect> <circle cx="12" cy="13" r="4"></circle> <path d="M16 6V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"></path> </svg> </div> <h1>View Your Photos</h1> <p class="subtitle">Enter your album name and password to access your gallery</p> <form id="login-form"> <input type="text" name="albumName" placeholder="Album name" autocomplete="off" required> <input type="password" name="password" placeholder="Password" autocomplete="current-password" required> <button type="submit"> <span class="btn-text">View Album</span> <span class="btn-loading" hidden> <svg class="spinner" width="20" height="20" viewBox="0 0 24 24"> <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31.4" stroke-dashoffset="10"></circle> </svg> </span> </button> <p class="error" id="login-error" hidden></p> </form> </div> </main> <script type="module">const a=document.getElementById("login-form"),e=document.getElementById("login-error"),n=a.querySelector("button"),r=n.querySelector(".btn-text"),s=n.querySelector(".btn-loading");a.addEventListener("submit",async l=>{l.preventDefault(),e.hidden=!0,n.disabled=!0,r.hidden=!0,s.hidden=!1;const o=new FormData(a),i=o.get("albumName"),c=o.get("password");try{const d=await fetch("/api/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({albumName:i,password:c})}),t=await d.json();d.ok&&t.albumId?window.location.href=`/${t.albumId}/gallery
